name: Build & Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt and build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            qt6-base-dev qt6-base-dev-tools \
            cmake build-essential ninja-build \
            libgl-dev libglu1-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libfontconfig1 libfreetype6

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: |
          g++ -std=c++20 -I include tests/test_main.cpp -o tests/run_tests
          ./tests/run_tests

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: CinemaBookingSystem-linux
          path: build/CinemaBookingSystem
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt DLLs
        run: |
          mkdir deploy
          copy build\Release\CinemaBookingSystem.exe deploy\
          copy data\filme.txt deploy\
          echo. > deploy\toate_rezervarile.txt
          windeployqt deploy\CinemaBookingSystem.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinemaBookingSystem-windows
          path: deploy/